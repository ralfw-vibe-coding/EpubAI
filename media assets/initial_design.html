  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

785\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  --color-bg: #f3f2f2;\n  --color-surface: #eae9e9;\n  --color-text: #201e1d;\n  --color-accent: #ec3013;\n  --color-accent-2: #e15b47;\n  --color-divider: color-mix(in srgb, #201e1d 40%, transparent);\n\n  /* Tonal ramps — generated in OKLCH on one shared lightness scale, so the\n     same step of any role matches the others in visual value. */\n  --color-neutral-100: #f8f4f4;\n  --color-neutral-200: #eae7e7;\n  --color-neutral-300: #d7d3d3;\n  --color-neutral-400: #bab6b6;\n  --color-neutral-500: #9b9797;\n  --color-neutral-600: #7d7979;\n  --color-neutral-700: #605d5d;\n  --color-neutral-800: #444141;\n  --color-neutral-900: #2d2b2b;\n\n  --color-accent-100: #fff2ef;\n  --color-accent-200: #ffe0d9;\n  --color-accent-300: #ffc4b8;\n  --color-accent-400: #ff9783;\n  --color-accent-500: #ff563c;\n  --color-accent-600: #dd2b0f;\n  --color-accent-700: #ae1800;\n  --color-accent-800: #7c1405;\n  --color-accent-900: #4d170e;\n\n  --color-accent-2-100: #fff2ef;\n  --color-accent-2-200: #ffe0da;\n  --color-accent-2-300: #ffc4b9;\n  --color-accent-2-400: #ff9784;\n  --color-accent-2-500: #ef6853;\n  --color-accent-2-600: #c94b39;\n  --color-accent-2-700: #9e3526;\n  --color-accent-2-800: #71261b;\n  --color-accent-2-900: #471d16;\n\n  --font-heading: \"Archivo\", system-ui, sans-serif;\n  --font-heading-weight: 800;\n  --font-body: \"Archivo\", system-ui, sans-serif;\n\n  --space-1: 4.0px;\n  --space-2: 8.0px;\n  --space-3: 12.0px;\n  --space-4: 16.0px;\n  --space-6: 24.0px;\n  --space-8: 32.0px;\n\n  --radius-sm: 0px;\n  --radius-md: 0px;\n  --radius-lg: 0px;\n\n  /* Elevation — derived from the ground: soft ink-tinted shadows on a\n     light theme, a hairline edge + ambient darkness on a dark one. */\n  --shadow-sm: 0 1px 2px color-mix(in srgb, #2d2b2b 14%, transparent);\n  --shadow-md: 0 3px 10px color-mix(in srgb, #2d2b2b 16%, transparent);\n  --shadow-lg: 0 12px 32px color-mix(in srgb, #2d2b2b 22%, transparent);\n}\n\nbody {\n  background: var(--color-bg);\n  color: var(--color-text);\n  font-family: var(--font-body);\n}\nh1, h2, h3, h4 { font-family: var(--font-heading); font-weight: var(--font-heading-weight); }\n\n.grayscale{filter:grayscale(1) contrast(1.08)}\n\n/* ══════════════════════════════════════════════════════════════════════════\n   Components — built with the tokens above. Plain CSS\n   on plain HTML: no JavaScript, no build step. Each class is documented in\n   readme.md and demonstrated in foundations/ and components/.\n   ══════════════════════════════════════════════════════════════════════ */\n\n*, *::before, *::after { box-sizing: border-box; }\nbody { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 2px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — buttons — */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  cursor: pointer; text-decoration: none;\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 13px; line-height: 1.2; color: var(--color-text);\n  background: transparent; border: 1px solid transparent;\n  padding: calc(var(--space-2) * 0.85) var(--space-3);\n  border-radius: var(--radius-md);\n}\n.btn svg { display: block; }\n.btn:disabled { opacity: 0.45; cursor: not-allowed; }\n.btn-primary { background: var(--color-accent); color: var(--color-bg); }\n.btn-primary:hover { background: var(--color-accent-600); }\n.btn-primary:active { background: var(--color-accent-700); }\n.btn-secondary { border-color: var(--color-divider); }\n.btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.btn-secondary:active { background: color-mix(in srgb, var(--color-text) 14%, transparent); }\n.btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }\n.btn-ghost:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }\n.btn-ghost:active { background: color-mix(in srgb, var(--color-accent) 18%, transparent); }\n.btn-icon { width: 34px; height: 34px; padding: 0; }\n.btn-block { width: 100%; margin-top: var(--space-2); justify-content: flex-start; text-align: left; }\n\n/* — forms — */\n.field > label {\n  display: block; font-size: 12px; margin-bottom: 5px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent);\n}\n.input {\n  width: 100%; min-height: 36px; padding: 6px 10px; font: inherit;\n  font-size: 14px; color: var(--color-text); caret-color: var(--color-accent);\n  background: var(--color-surface);\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.input:hover { border-color: color-mix(in srgb, var(--color-text) 45%, transparent); }\n.input:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: hidden;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.seg-opt {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px; font-size: 13px; cursor: pointer;\n}\n.seg-opt + .seg-opt { border-left: 1px solid var(--color-divider); }\n.seg-opt:has(input:checked) { background: var(--color-accent); color: var(--color-bg); }\n.seg-opt:not(:has(input:checked)):hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.seg-opt:has(input:focus-visible) { outline: 2px solid var(--color-accent); outline-offset: -2px; }\n\n/* — cards — */\n.card {\n  display: flex; flex-direction: column; gap: var(--space-2);\n  padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-surface);\n}\n.card-kicker { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }\n.card-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 17px; line-height: 1.2;\n}\n.card-body { margin: 0; font-size: 13px; opacity: 0.8; flex: 1; }\n.card-meta {\n  display: flex; align-items: center; gap: 6px; font-size: 11px;\n  color: color-mix(in srgb, var(--color-text) 50%, transparent);\n}\n.elev-sm { box-shadow: var(--shadow-sm); }\n.elev-md { box-shadow: var(--shadow-md); }\n.elev-lg { box-shadow: var(--shadow-lg); }\n\n/* — tags — */\n.tag {\n  display: inline-flex; align-items: center; font-size: 11px;\n  letter-spacing: 0.02em; padding: 3px 10px;\n  border-radius: calc(var(--radius-md) * 0.75);\n}\n.tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }\n.tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }\n.tag-neutral { background: var(--color-neutral-100); color: var(--color-neutral-800); }\n.tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); }\n\n/* — navigation — */\n.nav {\n  display: flex; align-items: center; gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-bottom: 2px solid var(--color-divider);\n}\n.nav-brand {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 18px; margin-right: auto;\n}\n.nav a { color: inherit; text-decoration: none; font-size: 14px; }\n.nav a:hover, .nav a[aria-current='page'] { color: var(--color-accent); }\n\n/* — tables — */\n.table { width: 100%; border-collapse: collapse; font-size: 14px; }\n.table th {\n  text-align: left; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: color-mix(in srgb, var(--color-text) 60%, transparent);\n  padding: var(--space-2); border-bottom: 2px solid var(--color-divider);\n}\n.table td {\n  padding: var(--space-2);\n  border-bottom: 1px solid var(--color-divider);\n}\n.table tbody tr:hover { background: color-mix(in srgb, var(--color-text) 4%, transparent); }\n\n/* — dialog — */\n.dialog-backdrop {\n  position: fixed; inset: 0; display: grid; place-items: center;\n  padding: var(--space-4);\n  background: color-mix(in srgb, var(--color-neutral-900) 50%, transparent);\n}\n.dialog {\n  width: min(440px, 100%); display: flex; flex-direction: column; gap: var(--space-3);\n  padding: var(--space-4); border-radius: var(--radius-lg);\n  background: var(--color-surface); box-shadow: var(--shadow-lg);\n}\n.dialog-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 20px;\n}\n.dialog-body { font-size: 14px; opacity: 0.85; }\n.dialog-actions { display: flex; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-2); }\n\n<\u002Fstyle>\n  <script src=\"60c6b469-c5c2-4558-895a-b63b132e617e\"><\u002Fscript>\n  <style>\n    body { margin: 0; background: var(--color-neutral-300); }\n    a { color: var(--color-accent); }\n    a:hover { color: var(--color-accent-600); }\n    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }\n    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }\n    ::-webkit-scrollbar { width: 0; height: 0; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"max-width: 520px; margin: 0 auto; min-height: 100dvh; background: var(--color-bg); position: relative; display: flex; flex-direction: column; font-family: var(--font-body); color: var(--color-text);\" data-screen-label=\"App\">\n\n  <!-- ══════════ LOGIN ══════════ -->\n  <sc-if value=\"{{ showLogin }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Login\" style=\"flex: 1; display: flex; flex-direction: column; padding: 24px 20px; min-height: 100dvh;\">\n      <div style=\"border-bottom: 2px solid var(--color-divider); padding-bottom: 12px; display: flex; align-items: baseline; justify-content: space-between;\">\n        <span style=\"font-family: var(--font-heading); font-weight: 800; font-size: 18px; letter-spacing: -0.01em;\">SHELF<\u002Fspan>\n        <span style=\"font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-neutral-600);\">EPUB Library<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 8px;\">\n        <h1 style=\"font-size: 44px; line-height: 1.02; letter-spacing: -0.02em; margin: 0 0 8px;\">Your books,<br>on every device.<\u002Fh1>\n        <sc-if value=\"{{ authEmailStep }}\" hint-placeholder-val=\"{{ true }}\">\n          <p style=\"color: var(--color-neutral-700); margin: 0 0 24px; font-size: 15px;\">Sign in with your e-mail. We'll send you a one-time code.<\u002Fp>\n          <label style=\"font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; display: block; margin-bottom: 6px;\">E-mail<\u002Flabel>\n          <input class=\"input\" type=\"email\" sc-camel-auto-focus=\"{{ true }}\" placeholder=\"you@example.com\" value=\"{{ email }}\" sc-camel-on-change=\"{{ onEmail }}\" sc-camel-on-key-down=\"{{ onEmailKey }}\" style=\"width: 100%; font-size: 16px;\">\n          <button class=\"btn btn-primary btn-block\" sc-camel-on-click=\"{{ onSendCode }}\" style=\"margin-top: 16px; padding: 14px 16px; font-size: 14px;\">Send code →<\u002Fbutton>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ authOtpStep }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"color: var(--color-neutral-700); margin: 0 0 24px; font-size: 15px;\">We sent a code to <strong>{{ email }}<\u002Fstrong>.<\u002Fp>\n          <label style=\"font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; display: block; margin-bottom: 6px;\">One-time code<\u002Flabel>\n          <input class=\"input\" type=\"text\" sc-camel-auto-focus=\"{{ true }}\" placeholder=\"Enter your code\" value=\"{{ otp }}\" sc-camel-on-change=\"{{ onOtp }}\" sc-camel-on-key-down=\"{{ onOtpKey }}\" style=\"width: 100%; font-size: 20px; letter-spacing: 0.15em; font-family: var(--font-heading); font-weight: 800; text-align: left;\">\n          <button class=\"btn btn-primary btn-block\" sc-camel-on-click=\"{{ onVerify }}\" style=\"margin-top: 16px; padding: 14px 16px; font-size: 14px;\">Sign in →<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"border-top: 2px solid var(--color-divider); padding-top: 12px; font-size: 11px; color: var(--color-neutral-600); letter-spacing: 0.04em;\">READS EPUB IN THE BROWSER — NO INSTALL<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ══════════ CATALOG ══════════ -->\n  <sc-if value=\"{{ showCatalog }}\" hint-placeholder-val=\"{{ true }}\">\n    <div data-screen-label=\"Catalog\" style=\"flex: 1; display: flex; flex-direction: column; padding-bottom: 64px;\">\n      <div style=\"padding: 16px 16px 0; position: sticky; top: 0; background: var(--color-bg); z-index: 5; border-bottom: 2px solid var(--color-divider);\">\n        <div style=\"display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px;\">\n          <span style=\"font-family: var(--font-heading); font-weight: 800; font-size: 18px;\">SHELF<\u002Fspan>\n          <div style=\"display: flex; gap: 6px; align-items: center;\">\n            <button class=\"btn btn-primary\" sc-camel-on-click=\"{{ onOpenUpload }}\" style=\"padding: 8px 14px;\">+ Upload EPUB<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ onOpenSettings }}\" title=\"Settings\" aria-label=\"Settings\" style=\"width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: transparent; border: 1px solid var(--color-divider); cursor: pointer; color: var(--color-text);\" style-hover=\"border-color: var(--color-accent); color: var(--color-accent-700);\">\n              <svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"square\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 : 18px 20px 28px; animation: sheetUp 0.2s ease-out;\">\n          <div style=\"display: flex; gap: 10px; margin-bottom: 12px;\">\n            <div style=\"flex: none; width: 4px; background: {{ editorColor }};\"><\u002Fdiv>\n            <div style=\"flex: 1; font-size: 13px; font-style: italic; line-height: 1.45; max-height: 60px; overflow: hidden;\">“{{ editorText }}”<\u002Fdiv>\n          <\u002Fdiv>\n          <textarea class=\"input\" rows=\"3\" placeholder=\"Write a note…\" value=\"{{ noteDraft }}\" sc-camel-on-change=\"{{ onNoteDraft }}\" style=\"width: 100%; font-size: 15px; resize: none; font-family: var(--font-body);\"><\u002Ftextarea>\n          <div style=\"display: flex; gap: 8px; margin-top: 12px;\">\n            <button class=\"btn btn-primary\" sc-camel-on-click=\"{{ onSaveNote }}\" style=\"flex: 1; padding: 12px;\">Save note<\u002Fbutton>\n            <button class=\"btn btn-secondary\" sc-camel-on-click=\"{{ onCloseNoteEditor }}\" style=\"padding: 12px;\">Cancel<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 430, &quot;height&quot;: 900}, &quot;catalogVariant&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Grid&quot;, &quot;Editorial&quot;, &quot;Compact&quot;], &quot;default&quot;: &quot;Grid&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Catalog&quot;, &quot;description&quot;: &quot;Layout variant of the Covers tab&quot;}, &quot;defaultReaderMode&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Paged&quot;, &quot;Scroll&quot;], &quot;default&quot;: &quot;Paged&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Reader&quot;}, &quot;translationLanguage&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Deutsch&quot;, &quot;English&quot;, &quot;Français&quot;, &quot;Español&quot;], &quot;default&quot;: &quot;Deutsch&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;App settings&quot;, &quot;description&quot;: &quot;Target language for Translate and assistant replies&quot;}, &quot;startLoggedIn&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;App settings&quot;, &quot;description&quot;: &quot;Skip the OTP login screen&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.contentRef = React.createRef();\n    this.pagerRef = React.createRef();\n    this.chatScrollRef = React.createRef();\n    this.importFileRef = React.createRef();\n    this._lastBuildKey = '';\n    this._touchX = null;\n    this.state = {\n      screen: (this.props.startLoggedIn ?? false) ? 'catalog' : 'login',\n      authStep: 'email', email: '', otp: '',\n      tab: 'covers', search: '', activeTags: [],\n      books: this.seedBooks(),\n      detailId: null, editing: false, newTag: '', tagFocus: false,\n      language: null, removeConfirm: false, importMsg: '',\n      upload: null, uploadPct: 0,\n      readerId: null, page: 0, pageCount: 1, scrollPct: 0,\n      fontSize: 17, margin: 24, mode: null, font: 'serif',\n      showSettings: false, showToc: false, showNotes: false, notesSearch: '',\n      selActive: false, noteEditId: null, noteDraft: '',\n      bookmarks: [], navHistory: [],\n      aiSheet: null, aiSelText: '', aiResult: '', aiLoading: false,\n      chatOpen: false, chatQuote: '', chatMessages: [], chatDraft: '', chatLoading: false, chatBookId: null,\n      highlights: [\n        { id: 'hl-seed1', bookId: 1, text: 'a damp, drizzly November in my soul', color: '#f5d547', note: 'The famous mood image — quote this in the review.' },\n        { id: 'hl-seed2', bookId: 1, text: 'the watery part of the world', color: '#9ec5e8', note: '' },\n        { id: 'hl-seed3', bookId: 1, text: 'thousands upon thousands of mortal men fixed in ocean reveries', color: '#9fd6a0', note: 'City vs. sea longing — compare with Werther.' },\n        { id: 'hl-seed4', bookId: 3, text: 'a channel of cobblestones', color: '#f2aecb', note: '' }\n      ]\n    };\n  }\n\n  seedBooks() {\n    const mk = (id, title, author, tags, borrowed, progress, finished, chapters) =>\n      ({ id, title, author, tags, borrowed, progress, finished, chapters,\n         file: title.replace(/[^\\w\\d]+/g, '-').replace(/^-|-$/g, '').toLowerCase() + '.epub' });\n    const ch = (title, paras, len) => {\n      const out = []; let i = 0;\n      while (out.length < (len || 9)) { out.push(paras[i % paras.length]); i++; }\n      return { title, paras: out };\n    };\n    const moby = [\n      'Call me Ishmael. Some years ago — never mind how long precisely — having little or no money in my purse, and nothing particular to interest me on shore, I thought I would sail about a little and see the watery part of the world.',\n      'It is a way I have of driving off the spleen and regulating the circulation. Whenever I find myself growing grim about the mouth; whenever it is a damp, drizzly November in my soul; then, I account it high time to get to sea as soon as I can.',\n      'There now is your insular city of the Manhattoes, belted round by wharves as Indian isles by coral reefs — commerce surrounds it with her surf. Right and left, the streets take you waterward.',\n      'Circumambulate the city of a dreamy Sabbath afternoon. What do you see? Posted like silent sentinels all around the town, stand thousands upon thousands of mortal men fixed in ocean reveries.',\n      'But look! here come more crowds, pacing straight for the water, and seemingly bound for a dive. Strange! Nothing will content them but the extremest limit of the land.'\n    ];\n    const poe = [\n      'True! — nervous — very, very dreadfully nervous I had been and am; but why will you say that I am mad? Th Madame Vauquer, née de Conflans, is an elderly person who for the past forty years has kept a lodging-house in the Rue Neuve-Sainte-Geneviève, in the district that lies between the Latin Quarter and the Faubourg Saint-Marceau.',\n      'Her lodging-house is known as the Maison Vauquer, and receives men and women, old and young, and no word has ever been breathed against her respectable establishment.',\n      'The front of the lodging-house is at right angles to the road, and looks out upon a little garden, so that you see the side of the house in section, as it were, from the Rue Neuve-Sainte-Geneviève.',\n      'That house might seem picturesque enough elsewhere; in Paris it is grim. Beneath the little garden wall runs a channel of cobblestones, and along it the eye follows a story of quiet poverty.',\n      'In this quarter of Paris the pavements are dry in the sunniest weather, and the gutters are neither muddy nor full of water; grass grows along the walls.'\n    ];\n    const werther = [\n      'How happy I am that I am gone! My dear friend, what a thing is the heart of man! To leave you, from whom I have been inseparable, whom I love so dearly, and yet to feel happy!',\n      'I know you will forgive me. Have not other attachments been specially appointed by fate to torment a head like mine? Poor Leonora! and yet I was not to blame.',\n      'A wonderful serenity has taken possession of my entire soul, like these sweet mornings of spring which I enjoy with my whole heart. I am alone, and feel the charm of existence in this spot.',\n      'I am so happy, my dear friend, so absorbed in the exquisite sense of mere tranquil existence, that I neglect my talents. I should be incapable of drawing a single stroke at the present moment.',\n      'When the lovely valley teems with vapour around me, and the meridian sun strikes the upper surface of the impenetrable foliage of my trees, I throw myself down among the tall grass by the trickling stream.'\n    ];\n    const
